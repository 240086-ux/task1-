<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отправка данных в Firebase</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        input, button { margin: 5px; padding: 8px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Форма обратной связи</h2>
    <form id="contactForm">
        <input type="text" id="name" placeholder="Ваше имя" required><br>
        <input type="email" id="email" placeholder="Email" required><br>
        <button type="submit">Отправить</button>
    </form>
    <div id="message"></div>

    <!-- Импорт модулей Firebase (SDK версии 9+) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // ЗАМЕНИТЕ ЭТИ ДАННЫЕ НА СВОИ ИЗ КОНСОЛИ FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAe3Gc_hZNYcZSlngZJUX6-eddLkYze7Q4",
  authDomain: "task11-5a364.firebaseapp.com",
  projectId: "task11-5a364",
  storageBucket: "task11-5a364.firebasestorage.app",
  messagingSenderId: "24777385887",
  appId: "1:24777385887:web:08461db04ffd7f13407faa",
  measurementId: "G-SH3LWGRZJY"
};

        // Инициализация Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Обработка отправки формы
        const form = document.getElementById('contactForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            try {
                // Добавление документа в коллекцию "requests" (как в методичке)
                const docRef = await addDoc(collection(db, "requests"), {
                    name: name,
                    email: email,
                    timestamp: new Date()
                });
                messageDiv.textContent = `Данные отправлены! ID: ${docRef.id}`;
                messageDiv.className = 'success';
                form.reset();
            } catch (error) {
                console.error("Ошибка:", error);
                messageDiv.textContent = `Ошибка: ${error.message}`;
                messageDiv.className = 'error';
            }
        });
    </script>
</body>
</html>
